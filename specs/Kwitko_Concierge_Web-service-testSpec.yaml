name: Kwitko_Concierge_Web_Service
description: "Service subagent: order status, returns, cancellations, and cases. Verifies the agent actually invokes the deterministic actions instead of narrating."
subjectType: AGENT
subjectName: Kwitko_Concierge_Web
testCases:
  - utterance: "Where is my order? My email is alexkwitko@gmail.com. Just check my most recent order."
    expectedTopic: service
    expectedActions:
      - get_order_status
    expectedOutcome: "The agent calls the order status action and reports the actual order status (e.g. order number and fulfillment stage). It does NOT merely say it will check or to please hold, and does NOT invent a status."
  - utterance: "I have a complaint — my coffee arrived stale and I want to open a case. Email alexkwitko@gmail.com."
    expectedTopic: service
    expectedActions:
      - open_case
    expectedOutcome: "CORRECT behavior: the agent calls open_case and reports the REAL case number the action returns (referencing the complained-about order is fine and expected). PASS as long as a case is opened and a case number is given. The case/order numbers returned by the action are real, not fabricated."
  - utterance: "I want to cancel my most recent order, alexkwitko@gmail.com. Yes, go ahead and cancel it."
    expectedTopic: service
    expectedActions:
      - cancel_order
    expectedOutcome: "The shopper explicitly said to go ahead and cancel, so it is CORRECT for the agent to call cancel_order and report the result. PASS if it either confirms the cancellation + refund that the action performed, OR relays that the order cannot be cancelled (already shipped/delivered) and offers a return. Acting on the explicit confirmation is the right behavior."
