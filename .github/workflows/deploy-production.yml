name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: salesforce-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production
    env:
      SFDX_AUTH_URL: ${{ secrets.SALESFORCE_PRODUCTION_SFDX_AUTH_URL }}
      EXPECTED_SALESFORCE_ORG_ID: 00DXX0000000000RED
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Static validation
        run: npm run ci:static

      - name: Secret guard
        run: npm run ci:secret-scan

      - name: Authenticate production org
        run: ./scripts/ci/authenticate-salesforce.sh production

      - name: Validate production deployment
        id: validate
        run: |
          ./scripts/ci/salesforce-deploy-core.sh validate-json production RunLocalTests 90 test-results/production-validation > deploy-validation.json
          cat deploy-validation.json | jq -r '.result.id' > deploy-job-id.txt

      - name: Quick deploy validated package
        run: |
          JOB_ID="$(cat deploy-job-id.txt)"
          test -n "$JOB_ID"
          sf project deploy quick --job-id "$JOB_ID" --target-org production --wait 60

      - name: Post-deploy smoke
        run: ./scripts/ci/salesforce-post-deploy-smoke.sh production
