<template>
    <lightning-card title="Einstein Case Assistant" icon-name="utility:einstein">
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <lightning-button label="Summarize Case" variant="brand" onclick={summarize} class="slds-m-right_x-small"></lightning-button>
            <lightning-button label="Draft Reply" onclick={draftReply}></lightning-button>
            <template if:true={loading}>
                <div class="slds-m-top_small slds-is-relative slds-p-vertical_medium">
                    <lightning-spinner alternative-text="Generating..." size="small"></lightning-spinner>
                </div>
            </template>
            <template if:true={hasAi}>
                <lightning-textarea
                    class="slds-m-top_small"
                    label={heading}
                    value={aiText}
                    field-level-help="Generated by Einstein from this case's context. Review and edit before using.">
                </lightning-textarea>
            </template>
        </div>
    </lightning-card>
</template>
