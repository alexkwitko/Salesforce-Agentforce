<template>
    <div class="bb-shell">
        <p class="bb-announce">{announcement}</p>

        <header class="bb-header">
            <a class="bb-logo" href={homeUrl} aria-label="Bean & Brew home">
                <svg class="bb-logo__mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                    <path d="M8 16h20v9a8 8 0 0 1-8 8h-4a8 8 0 0 1-8-8z" fill="#e7d2b0"/>
                    <path d="M28 18h3.5a4.5 4.5 0 0 1 0 9H28" stroke="#e7d2b0" stroke-width="2.4" fill="none"/>
                    <path d="M15 6c2.5 2 2.5 4.5 0 6.5M21 5c2.5 2 2.5 4.5 0 6.5" stroke="#c87a42" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                <span class="bb-logo__word">Bean&nbsp;&amp;&nbsp;Brew</span>
            </a>

            <nav class="bb-nav" aria-label="Primary">
                <a href={homeUrl}>Home</a>
                <a href={productsUrl}>Shop</a>
                <a href={searchUrl}>Search</a>
            </nav>

            <div class="bb-actions">
                <a class="bb-account" href={accountUrl}>{accountLabel}</a>
                <a class="bb-cart" href={cartUrl} aria-label="Cart">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 4h2l2.4 12.3a2 2 0 0 0 2 1.7h7.7a2 2 0 0 0 2-1.6L22 8H6"/>
                        <circle cx="10" cy="21" r="1.3"/><circle cx="18" cy="21" r="1.3"/>
                    </svg>
                    <template lwc:if={hasItems}><span class="bb-cart__badge">{cartCount}</span></template>
                </a>
            </div>
        </header>

        <main class="bb-main">
            <slot></slot>
        </main>

        <footer class="bb-footer">
            <div class="bb-footer__top">
                <div class="bb-footer__brand">
                    <span class="bb-logo__word bb-logo__word--dark">Bean&nbsp;&amp;&nbsp;Brew</span>
                    <p>Commercial-grade espresso, installed and backed for life. Brewed for cafés and serious home baristas.</p>
                </div>
                <div class="bb-footer__col">
                    <h4>Shop</h4>
                    <a href={productsUrl}>Espresso machines</a>
                    <a href={productsUrl}>Grinders</a>
                    <a href={productsUrl}>Accessories</a>
                </div>
                <div class="bb-footer__col">
                    <h4>Support</h4>
                    <a href={accountUrl}>My account</a>
                    <a href={cartUrl}>Cart</a>
                    <a href={homeUrl}>Install &amp; warranty</a>
                </div>
                <div class="bb-footer__col">
                    <h4>Visit</h4>
                    <a href={homeUrl}>Our roastery</a>
                    <a href={homeUrl}>Book a consult</a>
                    <a href={homeUrl}>Contact</a>
                </div>
            </div>
            <div class="bb-footer__bottom">
                <span>&copy; 2026 Bean &amp; Brew Coffee Co.</span>
                <span>15-year parts &amp; labor warranty · White-glove install</span>
            </div>
        </footer>
    </div>
</template>
